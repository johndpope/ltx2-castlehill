# =============================================================================
# VFM v3b — Self-E + obs_loss on 5K (resume from step 10000)
# =============================================================================
# Adding obs_loss_weight=25 (from anticollapse v1f recipe) to force
# text-conditioned adapter noise. Previous run had obs=0 in compute_loss.
# Also adding mu_align and diversity losses.
# =============================================================================

model:
  model_path: "/media/2TB/ltx-models/ltx2.3/ltx-2.3-22b-distilled.safetensors"
  text_encoder_path: "/media/2TB/ltx-models/gemma"
  training_mode: "lora"
  load_checkpoint: "/media/2TB/omnitransfer/output/vfm_v3b_self_e_5k/checkpoints/lora_weights_step_10000.safetensors"
  load_noise_adapter: "/media/2TB/omnitransfer/output/vfm_v3b_self_e_5k/checkpoints/noise_adapter_step_10000.safetensors"

lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules:
    - "to_q"
    - "to_k"
    - "to_v"
    - "to_out.0"

training_strategy:
  name: "vfm_v3b"

  # Spherical Cauchy adapter
  spherical_noise: true
  kl_weight: 0.001
  kl_free_bits: 0.25

  # Self-evaluation
  self_eval_weight: 1.0
  self_eval_cfg_scale: 5.0
  self_eval_s_range: [0.1, 0.5]
  energy_preserving_norm: true
  self_eval_prob: 1.0             # ALWAYS apply self-eval (0.5 = skip half = wasted steps)

  # Observation loss (forces text-conditioned adapter noise)
  obs_loss_weight: 25.0
  obs_noise_level: 0.2

  # Perceptual loss
  latent_perceptual_weight: 1.0

  # mu→x₀ alignment (anti-collapse)
  mu_align_weight: 5.0
  mu_align_warmup_steps: 0

  # Diversity
  diversity_weight: 0.2
  temporal_diversity_weight: 0.2
  spatial_diversity_weight: 0.1
  diversity_warmup_steps: 0

  # gt reconstruction
  gt_weight: 0.1

  # Flow
  flow_match_weight: 0.0
  recon_weight: 0.0

  # Adapter
  adapter_variant: "transformer"
  adapter_hidden_dim: 512
  adapter_num_heads: 8
  adapter_num_layers: 4
  adapter_pos_dim: 256

  # Per-token sigma
  per_token_sigma: true
  sigma_min: 0.05
  sigma_max: 0.95
  sigma_head_hidden_dim: 256

  # VFM settings
  alpha: 1.0             # ALWAYS use adapter (0.5 = 50% skip = obs_loss sees 0 half the time)
  tau: 1.0
  adaptive_loss: true
  ema_decay: 0.999
  first_frame_conditioning_p: 0.1
  distill_mode: "none"

  log_reconstructions: true
  reconstruction_log_interval: 500
  log_vfm_metrics: true

  inverse_problem_weights:
    i2v: 0.4
    t2v: 0.6

  with_audio: false

optimization:
  learning_rate: 5.0e-4
  adapter_learning_rate: 1.0e-3
  steps: 10000
  batch_size: 2
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "cosine"
  scheduler_params:
    eta_min: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 50
  enable_gradient_checkpointing: true

acceleration:
  mixed_precision_mode: "bf16"
  quantization: "int8-quanto"
  load_text_encoder_in_8bit: true

hardware:
  devices:
    transformer: "cuda:0"
    vae_decoder: "cuda:1"
    vae_encoder: "cuda:1"

data:
  preprocessed_data_root: "/media/12TB/ddit_ditto_data_23"
  num_dataloader_workers: 2
  use_cached_final_embeddings: true
  final_embeddings_dir: "conditions_final"

checkpoints:
  interval: 500
  keep_last_n: 5

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: {}

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: true
  project: "vfm-v3b"
  entity: null
  tags: ["self-e", "vfm-v3b", "5k", "obs25", "perceptual", "mu-align", "resume-10k"]
  log_validation_videos: false

seed: 42
output_dir: "/media/2TB/omnitransfer/output/vfm_v3b_self_e_5k_obs"
