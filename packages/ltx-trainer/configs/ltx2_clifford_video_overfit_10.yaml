# =============================================================================
# CliffordVideoAttention v2 — Overfit 10-sample (LTX-2 19B on 3090)
# =============================================================================
# Changes from v1 (loss 1.07):
#   - 32 spatial shifts (was 12) — 2.7x wider receptive field
#   - 8 temporal shifts (was 4) — better motion capture
#   - LoRA rank 16 (was 4) with to_q/to_k/to_v/to_out/score_mix
#   - score_mix_lr_multiplier: 3.0 — faster geometric mixing adaptation
#   - log_reconstruction_images: true — target/predict/source triplets in W&B
#
# Success criteria:
#   - loss_mf < 0.3 (was 1.07 in v1)
#   - Reconstruction images show recognizable structure
# =============================================================================

model:
  model_path: "/mnt/2TB/ltx-models/ltx2/ltx-2-19b-distilled.safetensors"
  text_encoder_path: "/mnt/2TB/ltx-models/gemma"
  training_mode: "lora"

  # Clifford attention swap (applied post-load to all 48 self-attn blocks)
  self_attn_type: "clifford_video"
  clifford_kwargs:
    num_spatial_shifts: 12
    num_temporal_shifts: 4
    num_channel_shifts: 4
    max_spatial_len: 2048
    spherical_norm: false
    num_frames: 1

lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules:
    - "to_q"
    - "to_k"
    - "to_v"
    - "to_out.0"
    - "shift_gate_proj"

training_strategy:
  name: "text_to_video"
  with_audio: false
  log_reconstructions: true
  reconstruction_log_interval: 50

optimization:
  learning_rate: 5.0e-4
  steps: 1000
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "cosine"
  scheduler_params:
    eta_min: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 50
  enable_gradient_checkpointing: true
  # Higher LR for score_mix params (3x multiplier applied in trainer)
  score_mix_lr_multiplier: 3.0

acceleration:
  mixed_precision_mode: "bf16"
  quantization: "int8-quanto"
  load_text_encoder_in_8bit: true

hardware:
  devices:
    text_encoder: "cuda:0"
    vae_encoder: "cuda:0"
    vae_decoder: "cuda:0"
    transformer: "cuda:0"
    audio_vae: "cuda:0"
    vocoder: "cuda:0"

data:
  preprocessed_data_root: "/mnt/2TB/ditto_data/ditto_10sample"
  num_dataloader_workers: 0
  use_cached_final_embeddings: true
  final_embeddings_dir: "conditions_final"

checkpoints:
  interval: 200
  keep_last_n: 3

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: {}

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: true
  project: "clifford-video-attn"
  entity: null
  tags: ["clifford-v3", "sigmoid-gates", "rank16", "overfit-10", "3090"]
  log_validation_videos: false

seed: 42
output_dir: "/mnt/2TB/output/clifford_video_v3_sigmoid_gates"
