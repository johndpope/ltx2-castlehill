# =============================================================================
# VFM v1b Overfit Sanity Check — 1 Sample
# =============================================================================
# Purpose: Validate v1b temporally-aware noise adapter (self-attn + cross-attn
# + positional encoding) on a single sample before scaling.
#
# v1b improvements over v1a:
#   1. Self-attention across tokens → inter-token noise coordination
#   2. Cross-attention to FULL text sequence (not pooled)
#   3. Sinusoidal positional encoding → per-token (t, h, w) awareness
#
# Success criteria:
#   - loss_mf → ~0 (adapter + flow map reconstruct perfectly)
#   - Adapter μ should vary across tokens (not identical like v1a)
#   - Decoded video shows GT-matching reconstruction
# =============================================================================

model:
  model_path: "/media/2TB/ltx-models/ltx2/ltx-2-19b-distilled.safetensors"
  text_encoder_path: "/media/2TB/ltx-models/gemma"
  training_mode: "lora"

lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules:
    - "to_k"
    - "to_q"
    - "to_v"
    - "to_out.0"

training_strategy:
  name: "vfm_v1b"

  first_frame_conditioning_p: 0.0

  # === v1b Noise Adapter ===
  adapter_hidden_dim: 512
  adapter_num_heads: 8
  adapter_num_layers: 4
  adapter_pos_dim: 256
  adapter_learning_rate: 1.0e-4

  # === VFM Loss ===
  tau: 1.0
  obs_noise_level: 0.2
  alpha: 0.5
  kl_weight: 3.0
  kl_free_bits: 0.25
  obs_loss_weight: 1.0

  # === Min-SNR Timestep Weighting ===
  # Clips SNR contribution: downweights easy (low-σ) steps, caps hard (high-σ) steps.
  # Only applied to L_mf. Set to null to disable. Recommended: 5.0-8.0.
  min_snr_gamma: 5.0

  # === Adaptive loss ===
  adaptive_loss: true
  adaptive_exclude_kl: true
  adaptive_gamma: 1.0
  adaptive_p: 0.5

  # === EMA ===
  ema_decay: 0.999

  # === No flow map freezing ===
  freeze_flow_map_steps: 0

  # === Only i2v task ===
  inverse_problem_weights:
    i2v: 1.0

  with_audio: false

  # === Logging ===
  log_reconstructions: true
  reconstruction_log_interval: 500
  log_vfm_metrics: true

optimization:
  learning_rate: 5.0e-4
  steps: 5000
  batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "cosine"
  scheduler_params:
    eta_min: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 100
  enable_gradient_checkpointing: true

acceleration:
  mixed_precision_mode: "bf16"
  quantization: "int8-quanto"
  load_text_encoder_in_8bit: true

hardware:
  devices:
    text_encoder: "cuda:1"
    vae_encoder: "cuda:1"
    vae_decoder: "cuda:1"
    transformer: "cuda:0"
    audio_vae: "cuda:0"
    vocoder: "cuda:0"

data:
  preprocessed_data_root: "/media/2TB/omnitransfer/data/ditto_500sample"
  num_dataloader_workers: 0
  use_cached_final_embeddings: true
  final_embeddings_dir: "conditions_final"

validation:
  prompts: []
  negative_prompt: "blurry, distorted, low quality"
  video_dims: [768, 448, 25]
  frame_rate: 20.0
  seed: 42
  inference_steps: 4
  interval: null
  videos_per_prompt: 1
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks: [29]
  stg_mode: "stg_v"
  generate_audio: false
  skip_initial_validation: true

checkpoints:
  interval: 500
  keep_last_n: 3

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: {}

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: true
  project: "vfm-vanilla"
  entity: null
  tags: ["vfm-v1b", "temporal-aware", "500-sample", "grad-accum-4", "video-recon"]
  log_validation_videos: false

seed: 42
output_dir: "/media/2TB/omnitransfer/output/vfm_v1b_500sample"
