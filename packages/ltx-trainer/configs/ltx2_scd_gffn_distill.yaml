# =============================================================================
# LTX-2 SCD — gFFN Distillation (FFN → CliffordNet gFFN-Global)
# =============================================================================
#
# Distills the standard FeedForward network into a geometric FFN (gFFN-Global)
# inspired by CliffordNet. Uses intermediate KD (MSE on per-layer FFN outputs)
# plus output matching loss.
#
# The gFFN-Global replaces the standard dim→4*dim→dim MLP with:
#   - Global average pooling as context
#   - Shifted geometric products (inner + wedge) for algebraically complete mixing
#   - Single projection back to dim
#
# Usage:
#   cd packages/ltx-trainer
#   python scripts/distill_ffn_to_gffn.py configs/ltx2_scd_gffn_distill.yaml
#
# After distillation, use the gFFN weights for SCD training:
#   python scripts/train.py configs/ltx2_scd_gffn.yaml  # (with gffn_weights loaded)
#
# =============================================================================

# gFFN-specific configuration (consumed by distill_ffn_to_gffn.py, not LtxTrainerConfig)
gffn:
  variant: "gffn_global"   # "gffn_global" or "gffn_hybrid"
  num_shifts: 4            # {1,2,4,8} — 4 shifts is the sweet spot
  mode: "full"             # "full" (inner+wedge), "inner", or "wedge"
  kd_weight: 0.5           # Weight for intermediate KD loss

# Model
model:
  model_path: "/media/2TB/ltx-models/ltx2/ltx-2-19b-dev.safetensors"
  text_encoder_path: "/media/2TB/ltx-models/gemma"
  training_mode: "full"    # Full fine-tuning of gFFN modules (not LoRA)

# Training strategy: SCD
training_strategy:
  name: "scd"
  encoder_layers: 32
  decoder_input_combine: "token_concat"
  per_frame_decoder: true
  first_frame_conditioning_p: 0.1
  with_audio: false

# Optimization — AdamW for distillation (Muon not needed for KD)
optimization:
  learning_rate: 1.0e-4
  steps: 2000
  batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "cosine"
  scheduler_params:
    eta_min: 1.0e-6
  weight_decay: 0.01
  enable_gradient_checkpointing: true

# Acceleration
acceleration:
  mixed_precision_mode: "bf16"
  quantization: "int8-quanto"
  load_text_encoder_in_8bit: true

# Hardware
hardware:
  devices:
    text_encoder: "cuda:1"
    vae_encoder: "cuda:1"
    vae_decoder: "cuda:1"
    transformer: "cuda:0"
    audio_vae: "cuda:0"
    vocoder: "cuda:0"

# Data
data:
  preprocessed_data_root: "/media/2TB/omnitransfer/data/ditto_subset"
  num_dataloader_workers: 2
  use_cached_final_embeddings: true
  final_embeddings_dir: "conditions_final"

# Validation — disabled for distillation
validation:
  prompts: []
  negative_prompt: "blurry, distorted, low quality"
  video_dims: [768, 448, 25]
  frame_rate: 20.0
  seed: 42
  inference_steps: 12
  interval: null
  videos_per_prompt: 1
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks: [29]
  stg_mode: "stg_v"
  generate_audio: false
  skip_initial_validation: true

# Checkpoints
checkpoints:
  interval: 200
  keep_last_n: 5

# Flow Matching
flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: {}

# Hub
hub:
  push_to_hub: false
  hub_model_id: null

# W&B
wandb:
  enabled: true
  project: "scd-gffn-distill"
  entity: null
  tags: ["scd", "gffn", "cliffordnet", "distillation", "geometric-ffn"]
  log_validation_videos: false

# General
seed: 42
output_dir: "/media/2TB/omnitransfer/output/scd_gffn_distill"
